services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: landintel
      POSTGRES_USER: landintel
      POSTGRES_PASSWORD: landintel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landintel -d landintel"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://landintel:landintel@postgres:5432/landintel
      RUN_DB_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - |
        until python -c "import os; from sqlalchemy import create_engine, text; engine = create_engine(os.environ['DATABASE_URL']); conn = engine.connect(); conn.execute(text('SELECT 1')); conn.close()"; do
          sleep 2
        done
        alembic upgrade head

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://landintel:landintel@postgres:5432/landintel
      STORAGE_BACKEND: local
      STORAGE_LOCAL_ROOT: /data/storage
      RUN_DB_MIGRATIONS: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - raw_storage:/data/storage
      - ./tests/fixtures:/app/tests/fixtures:ro

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://landintel:landintel@postgres:5432/landintel
      STORAGE_BACKEND: local
      STORAGE_LOCAL_ROOT: /data/storage
      RUN_DB_MIGRATIONS: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "9101:9101"
    volumes:
      - raw_storage:/data/storage

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://landintel:landintel@postgres:5432/landintel
      RUN_DB_MIGRATIONS: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./services/web
    environment:
      AUTH_SESSION_SECRET: landintel-local-web-session-secret
      LANDINTEL_WEB_AUTH_COOKIE_SECURE: "false"
      LANDINTEL_WEB_PUBLIC_ORIGIN: http://localhost:3000
      INTERNAL_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_MAP_STYLE_URL: https://demotiles.maplibre.org/style.json
      PORT: 3000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  raw_storage:
